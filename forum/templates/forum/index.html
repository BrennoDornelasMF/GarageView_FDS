<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket - Página Inicial</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <header class="cabecalho">
        <div class="logo">LOGO</div>
        <div class="busca-container">
            <input type="text" placeholder="Buscar Veículo...">
        </div>
        <div class="perfil-container">
            <span class="nome-perfil">Perfil</span>
            <div class="foto-perfil">
            </div>
        </div>
    </header>

    <div class="container-principal">
        
        <aside class="barra-lateral">
            <h3>Filtros</h3>
            <details>
                <summary> filtros</summary>
                <div class="placeholder-filtros">
                    <form method="get" action="">
                        <label>Preço mínimo</label><br>
                        <input type="number" step="0.01" name="min_price" value="{{ min_price }}" style="width:100%; padding:6px; margin-bottom:8px;">
                        <label>Preço máximo</label><br>
                        <input type="number" step="0.01" name="max_price" value="{{ max_price }}" style="width:100%; padding:6px; margin-bottom:8px;">
                        <div style="display:flex; gap:8px; margin-top:6px;">
                            <button class="btn-primary small" type="submit">Aplicar</button>
                            <a href="{% url 'forum:index' %}"><button type="button">Limpar</button></a>
                        </div>
                    </form>
                </div>
            </details>
        </aside>

        <main>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h2>Últimos anúncios</h2>
                <a href="{% url 'forum:ad_create' %}"><button class="btn-primary">Criar anúncio</button></a>
            </div>

            <div class="grid-anuncios">
                {% if anuncios %}
                    {% for ad in anuncios %}
                        <div class="card-veiculo">
                            <div class="imagem-veiculo">
                                {% if ad.imagem_url %}
                                    <img src="{{ ad.imagem_url }}" alt="{{ ad.titulo }}">
                                {% else %}
                                    <img src="https://picsum.photos/seed/{{ ad.id }}/800/400" alt="imagem anuncio">
                                {% endif %}
                            </div>
                            <div class="info-veiculo">
                                <div class="dados-principais">
                                    <a href="{% url 'forum:ad_detail' ad.id %}"><div class="card-body-title">{{ ad.titulo }}</div></a>
                                    <div class="card-body-sub">{{ ad.descricao|truncatechars:100 }}</div>
                                </div>
                                <div class="localizacao"><small>R$ {{ ad.preco }}</small></div>
                            </div>
                        </div>
                    {% endfor %}
                {% else %}
                    <p>Nenhum anúncio disponível.</p>
                {% endif %}
            </div>
        </main>

    </div>

</body>
</html>
